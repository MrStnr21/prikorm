<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Прикорм">
<meta name="theme-color" content="#e8878c">
<title>Прикорм малыша</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fef6f3;--card:#fff;--text:#3d2c2c;--muted:#a08888;--accent:#e8878c;--accent3:#d4707a;--ok:#81b29a;--danger:#e63946;--shadow:0 2px 12px rgba(180,120,120,.1);--radius:14px}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);padding:0;min-height:100vh;padding-bottom:70px;-webkit-tap-highlight-color:transparent}
.wrap{max-width:480px;margin:0 auto;padding:12px}
header{background:linear-gradient(135deg,#e8878c,#d4707a);color:#fff;padding:env(safe-area-inset-top,16px) 16px 14px;text-align:center;position:sticky;top:0;z-index:100}
header h1{font-size:20px;font-weight:800}
header p{font-size:11px;opacity:.7;margin-top:2px}
/* Bottom nav */
nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0d8d5;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
nav button{flex:1;padding:12px 4px 10px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}
nav button.active{color:var(--accent);border-top:2px solid var(--accent)}
.tab{display:none}.tab.active{display:block}
/* Sub tabs inside plan */
.sub-nav{display:flex;gap:0;margin-bottom:12px;border-radius:10px;overflow:hidden;border:2px solid #f0d8d5}
.sub-nav button{flex:1;padding:8px;border:none;background:#fff;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}
.sub-nav button.active{background:var(--accent);color:#fff}
.sub-tab{display:none}.sub-tab.active{display:block}
/* Product tracker cards */
.card{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.product-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.pcheck{width:26px;height:26px;border-radius:8px;border:2px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.pcheck.done{background:var(--ok);border-color:var(--ok)}
.pcheck.done::after{content:'✓';color:#fff;font-weight:800;font-size:14px}
.pcheck.reacted{background:var(--danger);border-color:var(--danger)}
.pcheck.reacted::after{content:'✕';color:#fff;font-weight:800;font-size:14px}
.pname{font-weight:700;font-size:14px}
.pmeta{font-size:11px;color:var(--muted);margin-top:2px}
.ptype{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;display:inline-block;margin-top:3px}
.tv{background:#e8f5e9;color:#2e7d32}.tc{background:#fff3e0;color:#e65100}.tm{background:#fce4ec;color:#c62828}.tf{background:#f3e5f5;color:#7b1fa2}.te{background:#fff9c4;color:#f57f17}.tfi{background:#e0f7fa;color:#00838f}.td{background:#fce4ec;color:#ad1457}.to{background:#f5f5f5;color:#616161}
.pbar{height:5px;background:#eee;border-radius:3px;margin-top:6px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .3s}
.pvol{font-size:11px;color:var(--accent);font-weight:700;margin-top:4px}
.expand{background:none;border:none;color:var(--accent);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:2px 0;margin-top:4px}
.detail{display:none;margin-top:6px;padding:8px;background:#fef0ed;border-radius:10px}
.detail.open{display:block}
.dtrack{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:6px}
.ddot{width:100%;aspect-ratio:1;border-radius:5px;border:2px solid #eee;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s}
.ddot.filled{background:var(--ok);border-color:var(--ok);color:#fff}
.drow{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.note{width:100%;border:1px solid #f0d8d5;border-radius:6px;padding:6px 8px;font-family:inherit;font-size:11px;margin-top:6px;resize:none;background:#fff}
.search{width:100%;padding:8px 12px;border:2px solid #f0d8d5;border-radius:10px;font-family:inherit;font-size:13px;margin-bottom:10px;background:#fff;outline:none}
.search:focus{border-color:var(--accent)}
/* Day plan cards */
.dcard{background:var(--card);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:10px}
.dchk{width:22px;height:22px;border-radius:6px;border:2px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .2s}
.dchk.done{background:var(--ok);border-color:var(--ok)}
.dchk.done::after{content:'✓';color:#fff;font-weight:800;font-size:11px}
.dnum{font-weight:800;color:var(--accent3);font-size:13px;margin-bottom:3px}
.dnew{font-weight:700;color:var(--accent);font-size:13px}
.dctx{font-size:11px;color:var(--muted);margin-top:2px}
.cnt{text-align:center;padding:8px;font-size:12px;color:var(--muted);font-weight:700}
.cnt b{color:var(--accent3);font-size:16px}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.reset{background:var(--danger);color:#fff;border:none;border-radius:10px;padding:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:16px}
@media(prefers-color-scheme:dark){
:root{--bg:#2a1f2d;--card:#362a38;--text:#f0e4e6;--muted:#a08888;--shadow:0 2px 12px rgba(0,0,0,.3)}
nav{background:#362a38;border-color:#4a3a4c}header{background:linear-gradient(135deg,#8c4a5a,#6e3648)}.pcheck,.dchk{background:#3d2f3f;border-color:#5a4a5c}.detail{background:#3d2f3f}.note{background:#3d2f3f;border-color:#4a3a4c;color:#f0e4e6}.search{background:#3d2f3f;border-color:#4a3a4c;color:#f0e4e6}.sub-nav{border-color:#4a3a4c}.sub-nav button{background:#362a38;color:var(--muted)}.sub-nav button.active{background:var(--accent);color:#fff}.ddot{border-color:#5a4a5c}.pbar{background:#4a3a4c}
}
</style>
</head>
<body>
<header><h1>🍼 Прикорм малыша</h1><p>Трекер и план введения продуктов</p></header>
<div class="wrap">
<!-- TAB: Products -->
<div class="tab active" id="tab-prod">
<input class="search" type="text" placeholder="🔍 Найти продукт..." id="srch" oninput="filterP()">
<div id="prod-list"></div>
<button class="reset" onclick="resetAll()">Сбросить всё</button>
</div>
<!-- TAB: Plan -->
<div class="tab" id="tab-plan">
<div class="sub-nav">
<button class="active" onclick="subSw('todo',this)">Ввести</button>
<button onclick="subSw('done',this)">Введено ✓</button>
</div>
<div class="cnt" id="plan-cnt"></div>
<div class="sub-tab active" id="sub-todo"><div id="todo-list"></div></div>
<div class="sub-tab" id="sub-done"><div id="done-list"></div></div>
</div>
</div>
<nav>
<button class="active" onclick="mainSw('prod',this)">Продукты</button>
<button onclick="mainSw('plan',this)">План</button>
</nav>
<script>
const P=[
{id:'zucchini',n:'Кабачок',e:'🥒',t:'v',tg:150},{id:'cauliflower',n:'Цветная капуста',e:'🥦',t:'v',tg:150},{id:'broccoli',n:'Брокколи',e:'🥦',t:'v',tg:150},{id:'pumpkin',n:'Тыква',e:'🎃',t:'v',tg:150},{id:'patisson',n:'Патиссон',e:'🫛',t:'v',tg:150},
{id:'buckwheat',n:'Гречневая каша',e:'🥣',t:'c',tg:150},{id:'rice',n:'Рисовая каша',e:'🍚',t:'c',tg:150},{id:'corn',n:'Кукурузная каша',e:'🌽',t:'c',tg:150},
{id:'potato',n:'Картофель',e:'🥔',t:'v',tg:150},{id:'green_peas',n:'Зелёный горошек',e:'🟢',t:'v',tg:150},
{id:'rabbit',n:'Кролик',e:'🐇',t:'m',tg:50},{id:'turkey',n:'Индейка',e:'🦃',t:'m',tg:50},{id:'beef',n:'Говядина',e:'🐄',t:'m',tg:50},{id:'chicken',n:'Цыплёнок',e:'🐔',t:'m',tg:50},
{id:'apple',n:'Яблоко',e:'🍏',t:'f',tg:70},{id:'pear',n:'Груша',e:'🍐',t:'f',tg:70},{id:'banana',n:'Банан',e:'🍌',t:'f',tg:70},{id:'prune',n:'Чернослив',e:'🫐',t:'f',tg:80},
{id:'egg_yolk',n:'Желток',e:'🥚',t:'y',tg:0.5,u:'шт',fr:'2-3 р/нед'},
{id:'peach',n:'Персик',e:'🍑',t:'f',tg:80},{id:'apricot',n:'Абрикос',e:'🟠',t:'f',tg:80},{id:'plum',n:'Слива',e:'🟣',t:'f',tg:80},
{id:'carrot',n:'Морковь',e:'🥕',t:'v',tg:150,fr:'2-3 р/нед'},{id:'string_bean',n:'Стручковая фасоль',e:'🫘',t:'v',tg:150},
{id:'oat',n:'Овсяная каша',e:'🥣',t:'c',tg:180,nt:'Глютен'},{id:'pork',n:'Свинина',e:'🥩',t:'m',tg:70},
{id:'tvorog',n:'Творог',e:'🧀',t:'d',tg:40},{id:'kefir',n:'Кефир / йогурт',e:'🥛',t:'k',tg:200,u:'мл'},
{id:'cookie',n:'Печенье',e:'🍪',t:'o',tg:5},{id:'bread',n:'Хлеб',e:'🍞',t:'o',tg:10},
{id:'fish',n:'Треска/хек',e:'🐟',t:'fi',tg:60,fr:'2 р/нед'},
{id:'cabbage',n:'Белокочанная капуста',e:'🥬',t:'v',tg:150},{id:'beetroot',n:'Свёкла',e:'🟤',t:'v',tg:150},
{id:'blueberry',n:'Черника',e:'🫐',t:'f',tg:50},{id:'blackcurrant',n:'Чёрная смородина',e:'⚫',t:'f',tg:50},
{id:'wheat',n:'Пшеничная каша',e:'🌾',t:'c',tg:200,nt:'Глютен'},{id:'multigrain',n:'Многозерновая каша',e:'🥣',t:'c',tg:200},
{id:'pasta',n:'Макароны',e:'🍝',t:'o',tg:50},
];

const RAMP=[{d:1,l:'1 ч.л.',g:5},{d:2,l:'2 ч.л.',g:10},{d:3,l:'5 ч.л.',g:25},{d:4,l:'50 г',g:50},{d:5,l:'150 г',g:150}];
const RD=5;
const TL={v:'Овощ',c:'Каша',m:'Мясо',f:'Фрукт',y:'Желток',fi:'Рыба',d:'Молочное',k:'Молочное',o:'Допы'};
const TC={v:'tv',c:'tc',m:'tm',f:'tf',y:'te',fi:'tfi',d:'td',k:'td',o:'to'};

// Ramp arrays per type (5 days)
const vL=['1 ч.л.','2 ч.л.','5 ч.л.','50 г','150 г'];
const mL=['1 ч.л.','2 ч.л.','4 ч.л.','30 г','50 г'];
const fL=['1 ч.л.','2 ч.л.','4 ч.л.','40 г','70 г'];
const yL=['крошка','⅛ шт','¼ шт','¼ шт','½ шт'];
const dL=['1 ч.л.','2 ч.л.','4 ч.л.','25 г','40 г'];
const kL=['30 мл','50 мл','100 мл','150 мл','200 мл'];
const fiL=['1 ч.л.','2 ч.л.','4 ч.л.','30 г','60 г'];
const vR=[5,10,25,50,150];

// Generate day plan
const DAYS=[];
(function(){
let day=1;
const pool={v:[],c:[],m:[],f:[],y:[],d:[],k:[],fi:[],o:[]};
P.forEach(p=>{
const rL=p.t==='m'?mL:p.t==='f'?fL:p.t==='y'?yL:p.t==='d'?dL:p.t==='k'?kL:p.t==='fi'?fiL:vL;
for(let d=0;d<5;d++){
const em=p.e+' '+p.n;
let text=em+' — '+rL[d];
const ctx=[];
if(p.t==='v'){
const fill=150-vR[d];
if(fill>0&&pool.v.length>0)text+='  +  '+pool.v[pool.v.length-1].e+' '+pool.v[pool.v.length-1].n+' '+fill+' г';
if(pool.c.length>0)ctx.push(pool.c[pool.c.length-1].e+' каша 150 г');
if(pool.m.length>0)ctx.push(pool.m[pool.m.length-1].e+' мясо '+pool.m[pool.m.length-1].tg+' г');
if(pool.f.length>0)ctx.push(pool.f[pool.f.length-1].e+' фрукты 70 г');
}else if(p.t==='c'){
const fill=150-vR[d];
if(fill>0&&pool.c.length>0)text+='  +  '+pool.c[pool.c.length-1].e+' '+pool.c[pool.c.length-1].n+' '+fill+' г';
if(pool.v.length>0)ctx.push(pool.v.slice(-2).map(x=>x.e).join('+')+' овощи 150 г');
if(pool.m.length>0)ctx.push(pool.m[pool.m.length-1].e+' мясо к овощам');
}else if(p.t==='m'){
text=em+' — '+rL[d]+' (к овощам 150 г)';
if(pool.c.length>0)ctx.push(pool.c[pool.c.length-1].e+' каша 150 г');
if(pool.f.length>0)ctx.push(pool.f[pool.f.length-1].e+' фрукты 70 г');
}else if(p.t==='f'){
ctx.push('каша 150 г, овощи + мясо');
}else if(p.t==='y'){
text=em+' — '+rL[d]+' (в кашу)';
ctx.push('каша, овощи + мясо, фрукты');
}else if(p.t==='d'){
ctx.push('каша, овощи + мясо, фрукты');
}else if(p.t==='k'){
ctx.push('каша, овощи + мясо, фрукты, творог');
}else if(p.t==='fi'){
text=em+' — '+rL[d]+' (вместо мяса, к овощам)';
ctx.push('каша, фрукты');
}else{
ctx.push('остальное как обычно');
}
DAYS.push({day,newLine:text,ctx:ctx.join(', ')});
day++;
}
pool[p.t]=pool[p.t]||[];
pool[p.t].push(p);
});
})();

// State
let pState=loadPS();
let dState=loadDS();

function loadPS(){try{const v=localStorage.getItem('_v');if(v!=='21'){localStorage.removeItem('_ps');localStorage.removeItem('_ds');localStorage.setItem('_v','21')}const s=localStorage.getItem('_ps');if(s){const r=JSON.parse(s);P.forEach(p=>{if(!r[p.id])r[p.id]={s:'pending',days:[],notes:''}});return r}}catch(e){}const r={};P.forEach(p=>{r[p.id]={s:'pending',days:[],notes:''}});return r}
function loadDS(){try{const s=localStorage.getItem('_ds');if(s)return JSON.parse(s)}catch(e){}return new Array(DAYS.length).fill(false)}
function savePS(){localStorage.setItem('_ps',JSON.stringify(pState))}
function saveDS(){localStorage.setItem('_ds',JSON.stringify(dState))}

// Navigation
function mainSw(id,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(id==='plan')renderPlan()}
function subSw(id,btn){document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));document.getElementById('sub-'+id).classList.add('active');document.querySelectorAll('.sub-nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}

// Product tracker
function cycleS(id){const s=pState[id];if(s.s==='pending')s.s='done';else if(s.s==='done')s.s='reacted';else s.s='pending';savePS();const c=document.querySelector(`[data-pid="${id}"]`);if(c){c.querySelector('.pcheck').className='pcheck '+s.s;updBar(c,id)}}
function togDay(id,i){if(!pState[id].days)pState[id].days=[];pState[id].days[i]=!pState[id].days[i];savePS();const c=document.querySelector(`[data-pid="${id}"]`);if(c){const dots=c.querySelectorAll('.ddot');if(dots[i])dots[i].classList.toggle('filled',pState[id].days[i]);updBar(c,id)}}
function updBar(c,id){const s=pState[id],dc=(s.days||[]).filter(Boolean).length,pct=Math.min(100,Math.round(dc/RD*100));const f=c.querySelector('.pfill');if(f){f.style.width=pct+'%';f.style.background=s.s==='reacted'?'var(--danger)':'var(--ok)'}const v=c.querySelector('.pvol');if(v)v.textContent=`${dc}/${RD} · ${pct}%`}
function togDet(id){document.getElementById('det-'+id).classList.toggle('open')}
function saveN(id,v){pState[id].notes=v;savePS()}
function filterP(){const q=document.getElementById('srch').value.toLowerCase();document.querySelectorAll('.pcard').forEach(el=>{el.classList.toggle('hidden',q&&!el.dataset.name.toLowerCase().includes(q))})}

function renderProds(){
const c=document.getElementById('prod-list');let h='';
P.forEach(p=>{
const s=pState[p.id]||{s:'pending',days:[],notes:''};
const dc=(s.days||[]).filter(Boolean).length,pct=Math.min(100,Math.round(dc/RD*100));
const u=p.u||'г',tl=p.tg+' '+u;
h+=`<div class="card pcard" data-name="${p.n}" data-pid="${p.id}">
<div class="product-row">
<div class="pcheck ${s.s}" onclick="cycleS('${p.id}')"></div>
<div style="flex:1;min-width:0">
<div class="pname">${p.e} ${p.n}</div>
<div class="pmeta">Цель: ${tl}${p.fr?' · '+p.fr:''}${p.nt?' · ⚠️ '+p.nt:''}</div>
<span class="ptype ${TC[p.t]}">${TL[p.t]}</span>
</div>
</div>
<div class="pbar"><div class="pfill" style="width:${pct}%;background:${s.s==='reacted'?'var(--danger)':'var(--ok)'}"></div></div>
<div class="pvol">${dc}/${RD} · ${pct}%</div>
<button class="expand" onclick="togDet('${p.id}')">подробнее ▾</button>
<div class="detail" id="det-${p.id}">
<div style="font-size:11px;font-weight:700;margin-bottom:4px">Дни введения:</div>
<div class="dtrack">${RAMP.map((r,i)=>{const f=(s.days||[])[i];return`<div class="ddot ${f?'filled':''}" onclick="togDay('${p.id}',${i})" title="День ${r.d}: ${r.l}">${r.d}</div>`}).join('')}</div>
<div style="margin-top:6px">${RAMP.map(r=>`<div class="drow"><span>День ${r.d}</span><span>${r.l} (${r.g} г)</span></div>`).join('')}</div>
<textarea class="note" rows="2" placeholder="Заметки..." oninput="saveN('${p.id}',this.value)">${s.notes||''}</textarea>
</div></div>`;
});
c.innerHTML=h;
}

// Day plan
function togPlan(i){dState[i]=!dState[i];saveDS();renderPlan()}
function renderPlan(){
let todoH='',doneH='',dc=0;
DAYS.forEach((d,i)=>{
const ok=dState[i];if(ok)dc++;
const html=`<div class="dcard"><div class="dchk ${ok?'done':''}" onclick="togPlan(${i})"></div><div style="flex:1;min-width:0"><div class="dnum">День ${d.day}</div><div class="dnew">🆕 ${d.newLine}</div>${d.ctx?`<div class="dctx">+ ${d.ctx}</div>`:''}</div></div>`;
if(ok)doneH+=html;else todoH+=html;
});
document.getElementById('plan-cnt').innerHTML=`Осталось: <b>${DAYS.length-dc}</b> из ${DAYS.length}`;
document.getElementById('todo-list').innerHTML=todoH||'<div class="empty">Всё введено! 🎉</div>';
document.getElementById('done-list').innerHTML=doneH||'<div class="empty">Пока ничего</div>';
}

function resetAll(){if(confirm('Сбросить весь прогресс?')){localStorage.removeItem('_ps');localStorage.removeItem('_ds');pState=loadPS();dState=loadDS();renderProds();renderPlan();alert('Готово')}}

renderProds();
</script>
</body>
</html>
